<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Cinema | Exclusive Streaming Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: #18181b;
            --accent-red: #e11d48;
            --accent-blue: #2563eb;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 60px; }

        /* --- Player & Fullscreen Logic --- */
        .player-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            width: 100%;
        }

        /* Maximized/Fullscreen Overlay State */
        .player-wrapper.maximized {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            border-radius: 0;
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- Custom Controls Overlay --- */
        .custom-control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: opacity 0.5s ease;
            opacity: 1; /* Default visible */
            z-index: 10;
        }

        .custom-control-bar.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            transition: color 0.2s;
        }

        .control-btn:hover { color: var(--accent-blue); }

        .timeline-slider-container { flex-grow: 1; }
        .custom-timeline {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent-blue);
        }

        /* --- UI Elements --- */
        header { padding: 20px 4%; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 4%; }
        #hubView { display: none; }
        .episode-list { margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">On Cinema <span style="color:var(--accent-red)">Hub</span></div>
        <nav><a href="#" onclick="showView('hub')" style="color:white; text-decoration:none;">Enter Portal</a></nav>
    </header>

    <div class="container">
        <section id="hubView">
            <!-- Wrapper for Fullscreen + Overlay Controls -->
            <div class="player-wrapper" id="hub-wrapper" onmousemove="resetIdleTimer('hub')">
                <iframe id="main-iframe" src="https://www.youtube.com/embed/qFHLfmoLchI?enablejsapi=1&controls=0" frameborder="0"></iframe>
                
                <div class="custom-control-bar" id="hub-controls">
                    <!-- Left: Rewind and Forward together -->
                    <button class="control-btn" onclick="skipTimeSystem(-10, 'hub')"><i class="fas fa-backward"></i></button>
                    <button class="control-btn" id="hub-play-toggle" onclick="togglePlaybackSystem('hub')"><i class="fas fa-pause"></i></button>
                    <button class="control-btn" onclick="skipTimeSystem(10, 'hub')"><i class="fas fa-forward"></i></button>
                    
                    <!-- Center: Timeline -->
                    <div class="timeline-slider-container">
                        <input type="range" class="custom-timeline" id="hub-timeline" value="0" oninput="timelineScrubSystem(this.value, 'hub')">
                    </div>

                    <!-- Right: Fullscreen -->
                    <button class="control-btn" onclick="toggleFullscreenSystem('hub-wrapper')"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Idle Timer logic
        let idleTimers = { hub: null };

        function resetIdleTimer(playerKey) {
            const controls = document.getElementById(`${playerKey}-controls`);
            controls.classList.remove('hidden');
            
            clearTimeout(idleTimers[playerKey]);
            
            idleTimers[playerKey] = setTimeout(() => {
                controls.classList.add('hidden');
            }, 2000);
        }

        // Toggle Fullscreen Pseudo-state
        function toggleFullscreenSystem(elementId) {
            const wrapper = document.getElementById(elementId);
            wrapper.classList.toggle('maximized');
        }

        // Playback Command: Remove state reset to keep playing
        function togglePlaybackSystem(playerKey) {
            const iframe = document.getElementById('main-iframe');
            const btn = document.getElementById(`${playerKey}-play-toggle`);
            
            // Logic: Toggle Pause/Play via API
            iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            // Simplified for demonstration; real implementation would track 'isPaused' state
        }

        // Seek Command: No pause, just skip
        function skipTimeSystem(seconds, playerKey) {
            const iframe = document.getElementById('main-iframe');
            // 'seekTo' command format: [seconds, allowSeekAhead]
            // We retrieve current time from player in a production app, for now, we simulate skip
            iframe.contentWindow.postMessage(`{"event":"command","func":"seekBy","args":[${seconds}]}`, '*');
        }

        function timelineScrubSystem(value, playerKey) {
            // Scrubbing logic
        }

        function showView(view) { document.getElementById('hubView').style.display = 'block'; }
    </script>
</body>
</html>
