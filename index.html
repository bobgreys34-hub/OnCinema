<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Cinema at the Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red: #e50914;
            --blue: #0056b3;
            --dark-blue: #060b19;
            --card-bg: #111827;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top Solid Bar Header */
        header {
            background-color: var(--red);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .logo-group h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1;
        }

        .logo-group span {
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #ffcccc;
            text-transform: uppercase;
            display: block;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            padding: 6px 16px;
            border: 2px solid white;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        nav a:hover {
            background-color: white;
            color: var(--red);
        }

        /* Screen States Container */
        .view-container {
            max-width: 1400px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* 1. Welcome Splash Box View */
        .welcome-view {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .on-cinema-box {
            background-color: var(--card-bg);
            border: 4px solid var(--red);
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s;
        }

        .on-cinema-box:hover {
            transform: scale(1.02);
            border-color: var(--blue);
        }

        .on-cinema-box h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            margin-bottom: 10px;
        }

        .on-cinema-box p {
            color: #aaa;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 2. Season Selector View */
        .season-view {
            display: none;
            text-align: center;
            max-width: 600px;
            margin: 80px auto;
        }

        .season-view h3 {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .season-btn {
            background-color: var(--blue);
            color: white;
            border: none;
            padding: 20px 40px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .season-btn:hover {
            background-color: var(--red);
        }

        /* 3. Main Dynamic Hub Screen (Player Left, Dropdown Right) */
        .hub-view {
            display: none;
            grid-template-columns: 3fr 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .hub-view { grid-template-columns: 1fr; }
        }

        /* Left Column Structure */
        .player-column {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .video-wrapper #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Modern, Frameless, Unboxed Video Overlay controls */
        .player-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
        }

        .hide-controls {
            opacity: 0 !important;
            cursor: none !important;
        }

        .hide-cursor {
            cursor: none !important;
        }

        .custom-controls {
            pointer-events: auto;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            width: 100%;
        }

        .control-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.85);
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .control-btn:hover {
            color: var(--red);
            transform: translateY(-1px);
        }

        /* Movie Details Bottom Setup */
        .movie-details {
            background: var(--card-bg);
            padding: 25px;
            border-top: 4px solid var(--red);
        }

        .episode-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #fff;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .movie-card h4 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .meta-line {
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #ccc;
        }

        .meta-label {
            font-weight: bold;
            color: #8892b0;
        }

        .rating-badge {
            background-color: var(--blue);
            color: #fff;
            padding: 2px 8px;
            font-weight: bold;
            border-radius: 2px;
            font-size: 0.85rem;
        }

        .imdb-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--red);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .imdb-link:hover {
            text-decoration: underline;
        }

        /* Right Control Dropdown Column */
        .sidebar-column {
            background-color: var(--card-bg);
            padding: 20px;
            border-top: 4px solid var(--blue);
        }

        .sidebar-column h3 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .custom-select-wrapper {
            position: relative;
            width: 100%;
        }

        .episode-dropdown {
            width: 100%;
            padding: 12px;
            background-color: #0b111e;
            color: white;
            border: 2px solid #223049;
            font-size: 1rem;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            outline: none;
            border-radius: 4px;
        }

        .episode-dropdown:focus {
            border-color: var(--blue);
        }

        /* Footer */
        footer {
            background-color: #030611;
            text-align: center;
            padding: 20px;
            margin-top: auto;
            border-top: 2px solid #1e293b;
            font-size: 0.9rem;
            color: #64748b;
        }

        footer a {
            color: var(--red);
            text-decoration: none;
            font-weight: bold;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-group" style="cursor:pointer;" onclick="showView('welcome')">
            <h1>On Cinema</h1>
            <span>at the cinema</span>
        </div>
        <nav>
            <a href="about.html" target="_blank">About</a>
        </nav>
    </header>

    <div class="view-container">
        
        <!-- View 1: Clickable "On Cinema" Box Container -->
        <section class="welcome-view" id="welcomeView">
            <div class="on-cinema-box" onclick="showView('season')">
                <h2>On Cinema</h2>
                <p>Click to Enter Dashboard</p>
            </div>
        </section>

        <!-- View 2: Season Selector Deck -->
        <section class="season-view" id="seasonView">
            <h3>Select a Season</h3>
            <button class="season-btn" onclick="showView('hub')">Season 1</button>
        </section>

        <!-- View 3: Left Heavy Video Hub View Layout -->
        <section class="hub-view" id="hubView">
            
            <!-- Left Side Video Screen Structure -->
            <div class="player-column">
                <div class="video-wrapper" id="videoWrapper">
                    <div id="player"></div>
                    
                    <!-- Modern Fluid Frameless Overlay Layer controls -->
                    <div class="player-overlay" id="playerOverlay">
                        <div class="custom-controls">
                            <button class="control-btn" id="playPauseBtn">Pause</button>
                            <button class="control-btn" id="skipBtn">Skip 10s</button>
                            <button class="control-btn" id="captionBtn">Captions</button>
                            <button class="control-btn" id="qualityBtn">HD Mode</button>
                            <button class="control-btn" style="margin-left: auto;" id="fullscreenBtn">Fullscreen</button>
                        </div>
                    </div>
                </div>

                <!-- Bottom Ratings/Metadata Panel Frame -->
                <div class="movie-details">
                    <h3 class="episode-title" id="displayEpTitle">Season 1, Episode 1</h3>
                    <div class="movies-grid" id="movieMetaGrid"></div>
                </div>
            </div>

            <!-- Right Side Interactive Dropdown Menu Panel -->
            <div class="sidebar-column">
                <h3>Select Episode</h3>
                <div class="custom-select-wrapper">
                    <select class="episode-dropdown" id="epSelect" onchange="loadEpisode(this.value)">
                        <option value="0">Episode 1: The Man with the Iron Fists & Flight</option>
                        <option value="1">Episode 2: Twilight: Part Two & Anna Karenina</option>
                        <option value="2">Episode 3: Universal Soldier: Day of Reckoning & The Frozen Ground</option>
                    </select>
                </div>
            </div>

        </section>
    </div>

    <footer>
        Official Website: <a href="https://www.heinetwork.tv/" target="_blank">https://www.heinetwork.tv/</a>
    </footer>

    <script>
        const episodesData = [
            {
                vidId: 'qFHLfmoLchI',
                epTitle: "Season 1, Episode 1",
                movies: [
                    {
                        title: "The Man with the Iron Fists",
                        rating: "5.6/10",
                        director: "RZA",
                        cast: "RZA, Russell Crowe, Lucy Liu",
                        imdb: "https://www.imdb.com/title/tt1258972/"
                    },
                    {
                        title: "Flight",
                        rating: "7.3/10",
                        director: "Robert Zemeckis",
                        cast: "Denzel Washington, Don Cheadle, Kelly Reilly",
                        imdb: "https://www.imdb.com/title/tt1907668/"
                    }
                ]
            },
            {
                vidId: 'nfOMBioJDJg',
                epTitle: "Season 1, Episode 2",
                movies: [
                    {
                        title: "The Twilight Saga: Breaking Dawn - Part 2",
                        rating: "5.5/10",
                        director: "Bill Condon",
                        cast: "Kristen Stewart, Robert Pattinson, Taylor Lautner",
                        imdb: "https://www.imdb.com/title/tt1673434/"
                    },
                    {
                        title: "Anna Karenina",
                        rating: "6.6/10",
                        director: "Joe Wright",
                        cast: "Keira Knightley, Jude Law, Aaron Taylor-Johnson",
                        imdb: "https://www.imdb.com/title/tt1781769/"
                    }
                ]
            },
            {
                vidId: 'WzFILC5bI_c',
                epTitle: "Season 1, Episode 3",
                movies: [
                    {
                        title: "Universal Soldier: Day of Reckoning",
                        rating: "5.8/10",
                        director: "John Hyams",
                        cast: "Jean-Claude Van Damme, Scott Adkins, Dolph Lundgren",
                        imdb: "https://www.imdb.com/title/tt1659221/"
                    },
                    {
                        title: "The Frozen Ground",
                        rating: "6.4/10",
                        director: "Scott Walker",
                        cast: "Nicolas Cage, John Cusack, Vanessa Hudgens",
                        imdb: "https://www.imdb.com/title/tt2005374/"
                    }
                ]
            }
        ];

        function showView(viewName) {
            document.getElementById('welcomeView').style.display = 'none';
            document.getElementById('seasonView').style.display = 'none';
            document.getElementById('hubView').style.display = 'none';

            if(viewName === 'welcome') {
                document.getElementById('welcomeView').style.display = 'flex';
            } else if (viewName === 'season') {
                document.getElementById('seasonView').style.display = 'block';
            } else if (viewName === 'hub') {
                document.getElementById('hubView').style.display = 'grid';
                if (!player) {
                    initYouTubeEngine();
                } else {
                    player.playVideo();
                }
            }
        }

        function initYouTubeEngine() {
            let tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            let firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        }

        let player;
        let currentEpIndex = 0;
        let ccEnabled = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: episodesData[currentEpIndex].vidId,
                playerVars: {
                    'controls': 0, 
                    'rel': 0,
                    'modestbranding': 1,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            updateMetadata(currentEpIndex);
            setupCustomControls();
            setupInactivityDimmer();
            player.playVideo();
        }

        function setupCustomControls() {
            const playPauseBtn = document.getElementById('playPauseBtn');
            const skipBtn = document.getElementById('skipBtn');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const captionBtn = document.getElementById('captionBtn');
            const qualityBtn = document.getElementById('qualityBtn');
            const wrapper = document.getElementById('videoWrapper');

            playPauseBtn.addEventListener('click', () => {
                let state = player.getPlayerState();
                if (state == 1) {
                    player.pauseVideo();
                    playPauseBtn.innerText = "Play";
                } else {
                    player.playVideo();
                    playPauseBtn.innerText = "Pause";
                }
            });

            skipBtn.addEventListener('click', () => {
                let currentTime = player.getCurrentTime();
                player.seekTo(currentTime + 10, true);
            });

            captionBtn.addEventListener('click', () => {
                ccEnabled = !ccEnabled;
                player.unloadModule("captions");
                if(ccEnabled) {
                    player.loadModule("captions");
                    captionBtn.style.color = "var(--red)";
                } else {
                    captionBtn.style.color = "rgba(255, 255, 255, 0.85)";
                }
            });

            qualityBtn.addEventListener('click', () => {
                player.setPlaybackQuality('hd720');
            });

            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    wrapper.requestFullscreen().catch(err => { console.log(err) });
                } else {
                    document.exitFullscreen();
                }
            });
        }

        function setupInactivityDimmer() {
            const wrapper = document.getElementById('videoWrapper');
            const overlay = document.getElementById('playerOverlay');
            let timeout;

            function resetTimer() {
                overlay.classList.remove('hide-controls');
                wrapper.classList.remove('hide-cursor');
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    if (player && player.getPlayerState() === 1) {
                        overlay.classList.add('hide-controls');
                        wrapper.classList.add('hide-cursor');
                    }
                }, 3000);
            }

            wrapper.addEventListener('mousemove', resetTimer);
            wrapper.addEventListener('click', resetTimer);
        }

        function loadEpisode(index) {
            currentEpIndex = parseInt(index);
            player.loadVideoById(episodesData[currentEpIndex].vidId);
            document.getElementById('playPauseBtn').innerText = "Pause";
            updateMetadata(currentEpIndex);
        }

        function updateMetadata(index) {
            const data = episodesData[index];
            document.getElementById('displayEpTitle').innerText = data.epTitle;

            const grid = document.getElementById('movieMetaGrid');
            grid.innerHTML = "";

            data.movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = "movie-card";
                card.innerHTML = `
                    <h4>${movie.title}</h4>
                    <div class="meta-line"><span class="meta-label">IMDb Rating:</span> <span class="rating-badge">${movie.rating}</span></div>
                    <div class="meta-line"><span class="meta-label">Director:</span> ${movie.director}</div>
                    <div class="meta-line"><span class="meta-label">Cast:</span> ${movie.cast}</div>
                    <a href="${movie.imdb}" target="_blank" class="imdb-link">IMDb Page →</a>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
