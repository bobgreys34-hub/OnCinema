<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Cinema Fan Archive</title>
    <style>
        :root {
            --primary-blue: #0A192F;
            --accent-red: #D62246;
            --light-text: #F4F7F6;
            --card-bg: #172A45;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-blue);
            color: var(--light-text);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--accent-red);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .disclaimer {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 10px 0;
            border-bottom: 2px solid var(--accent-red);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--light-text);
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin: 0 5px;
            border-radius: 4px;
        }

        .tab-btn:hover {
            background-color: rgba(214, 34, 70, 0.2);
        }

        .tab-btn.active {
            background-color: var(--accent-red);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Content Container */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h2 {
            border-left: 5px solid var(--accent-red);
            padding-left: 10px;
            margin-top: 30px;
            text-transform: uppercase;
        }

        /* Video Grid Layout */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .video-card:hover {
            transform: translateY(-5px);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            padding: 15px;
        }

        .video-title {
            margin: 0;
            font-size: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>On Cinema</h1>
        <div class="disclaimer">This is not an official On Cinema site. Made by a fan.</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('on-cinema')">On Cinema</button>
        <button class="tab-btn" onclick="openTab('decker')">Decker</button>
    </div>

    <div class="container">
        
        <!-- On Cinema Tab -->
        <div id="on-cinema" class="tab-content active">
            <h2>Features & Trailers</h2>
            <div class="video-grid">
                <!-- Updated Link Title Block -->
                <div class="video-card">
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube.com/embed/CjxUL0NI9O4" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <p class="video-title">Mister America Official Trailer</p>
                    </div>
                </div>
                <!-- Feel free to add back your other existing On Cinema content here -->
            </div>
        </div>

        <!-- Decker Tab -->
        <div id="decker" class="tab-content">
            
            <h2>Season 1 - Classified</h2>
            <div class="video-grid">
                <div class="video-card">
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube.com/embed/zA-EqQhF_9o" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <p class="video-title">S1E1 - Classified</p>
                    </div>
                </div>

                <div class="video-card">
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube.com/embed/NX_MsOPxqzs" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <p class="video-title">S1E2 - Classified</p>
                    </div>
                </div>

                <div class="video-card">
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube.com/embed/PiR0toIBYDY" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <p class="video-title">S1E3 - Classified</p>
                    </div>
                </div>

                <div class="video-card">
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube.com/embed/n3AVpLZpDsg" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <p class="video-title">S1E4 - Classified</p>
                    </div>
                </div>

                <div class="video-card">
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube.com/embed/pLoiGFHWqWM" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <p class="video-title">S1E5 - Classified</p>
                    </div>
                </div>
            </div>

            <h2>Season 2 - Port of Call: Hawaii</h2>
            <div class="video-grid">
                <div class="video-card">
                    <div class="video-wrapper">
                        <iframe src="https://www.youtube.com/embed/h0SgQeEHRCw" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <p class="video-title">S2E1 - Port of Call: Hawaii</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function openTab(tabId) {
            // Hide all contents
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));

            // Remove active status from buttons
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Show selected tab content and activate button
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
