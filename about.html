<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - On Cinema Fan Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e50914;
            --blue: #0056b3;
            --dark-blue: #060b19;
            --card-bg: #111827;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--red);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .about-container {
            max-width: 650px;
            margin: 80px auto;
            padding: 40px;
            background-color: var(--card-bg);
            border-top: 5px solid var(--red);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            font-family: 'Oswald', sans-serif;
            color: white;
            margin-bottom: 25px;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 20px;
            color: #d1d5db;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            background-color: var(--blue);
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'Oswald', sans-serif;
            border-radius: 4px;
            transition: background 0.2s;
            letter-spacing: 0.5px;
        }

        .back-btn:hover {
            background-color: var(--red);
        }

        footer {
            background-color: #030611;
            text-align: center;
            padding: 20px;
            margin-top: auto;
            border-top: 2px solid #1e293b;
            font-size: 0.9rem;
            color: #64748b;
        }

        footer a {
            color: var(--red);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>On Cinema Fan Hub</h1>
    </header>

    <div class="about-container">
        <h2>About This Site</h2>
        <p>This site just puts all the On Cinema available in one place.</p>
        <p><strong>This is not an official On Cinema site.</strong> It was made entirely by a fan.</p>
        <p>All rights belong to the HEI Network team. Enjoy the reviews!</p>
        
        <a href="index.html" class="back-btn">← Back to Movies</a>
    </div>

    <footer>
        Official Website: <a href="https://www.heinetwork.tv/" target="_blank">https://www.heinetwork.tv/</a>
    </footer>

</body>
</html>
